spring:
  application:
    name: workflow-core

  config:
    import: optional:file:.env[.properties]

  docker:
    compose:
      enabled: false

  mongodb:
    uri: ${MONGODB_URI}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://d1780yz6azpd7k.cloudfront.net,http://sw1-1p-fe.s3-website-us-east-1.amazonaws.com,https://sw1-1p-fe.s3-website-us-east-1.amazonaws.com}
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://localhost:8001}
    internal-key: ${FASTAPI_INTERNAL_KEY:internal-dev-key}
  websocket:
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:4200,https://d1780yz6azpd7k.cloudfront.net,http://sw1-1p-fe.s3-website-us-east-1.amazonaws.com,https://sw1-1p-fe.s3-website-us-east-1.amazonaws.com}
  admin:
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:changeme}
  aws:
    s3:
      bucket: ${STORAGE_BUCKET:workflow-files}
      region: ${AWS_DEFAULT_REGION:us-east-1}
    dynamodb:
      region: ${AWS_DYNAMODB_REGION:us-east-1}
  demo:
    password: ${DEMO_PASSWORD:}
  base-url: ${APP_BASE_URL:http://localhost:8080}

onlyoffice:
  url: ${ONLYOFFICE_URL:http://localhost:8083}
  jwt-secret: ${ONLYOFFICE_JWT_SECRET:onlyoffice-secret-key}
  callback-base-url: ${ONLYOFFICE_CALLBACK_BASE_URL:http://host.docker.internal:8080}

dynamodb:
  table-prefix: ${DYNAMODB_TABLE_PREFIX:sw1}

signing:
  service-url: ${SIGNING_SERVICE_URL:http://localhost:9090}

logging:
  level:
    sw1.p1: DEBUG
    org.springframework.data.mongodb: INFO
