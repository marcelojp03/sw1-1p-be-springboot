services:
  mongodb:
    image: mongo:7.0
    container_name: workflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: workflow_db
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: workflow-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://root:root@mongodb:27017/workflow_db?authSource=admin
    profiles:
      - full

volumes:
  mongo_data:
